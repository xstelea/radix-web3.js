name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI: true
  FORCE_COLOR: "0"
  NO_COLOR: "1"

jobs:
  checks:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec biome lint ./packages/**/**/*.ts

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
